  <!-- VERTEX SHADER -->
  <script id="vertex-shader" type="x-shader/x-vertex">
    attribute vec3 a_position;
    attribute float a_size;
    attribute float a_alpha;
    attribute float a_prob;
    
    uniform mat4 u_projection;
    uniform mat4 u_view;
    uniform float u_time;
    uniform float u_zoom;
    uniform vec2 u_rotation; // x: rotationY, y: rotationX
    
    varying float v_alpha;
    varying float v_prob;
    
    void main() {
      // Rotation matrices
      float cy = cos(u_rotation.x);
      float sy = sin(u_rotation.x);
      float cx = cos(u_rotation.y);
      float sx = sin(u_rotation.y);
      
      // Auto rotation
      float autoAngle = u_time * 0.0005;
      float ca = cos(autoAngle);
      float sa = sin(autoAngle);
      
      vec3 pos = a_position * u_zoom;
      
      // Apply Y rotation (auto + manual)
      float totalY = u_rotation.x + autoAngle;
      float tcY = cos(totalY);
      float tsY = sin(totalY);
      vec3 rotY = vec3(
        pos.x * tcY - pos.z * tsY,
        pos.y,
        pos.x * tsY + pos.z * tcY
      );
      
      // Apply X rotation (manual only)
      vec3 rotX = vec3(
        rotY.x,
        rotY.y * cx - rotY.z * sx,
        rotY.y * sx + rotY.z * cx
      );
      
      vec4 viewPos = u_view * vec4(rotX, 1.0);
      gl_Position = u_projection * viewPos;
      
      // Point size with perspective
      float dist = length(viewPos.xyz);
      gl_PointSize = a_size * u_zoom * (400.0 / dist);
      
      v_alpha = a_alpha;
      v_prob = a_prob;
    }
  </script>

  <!-- FRAGMENT SHADER -->
  <script id="fragment-shader" type="x-shader/x-fragment">
    precision mediump float;
    
    varying float v_alpha;
    varying float v_prob;
    
    uniform int u_colorMode; // 0: amber, 1: blue, 2: lotus, 3: darkred, 4: spring
    
    vec3 hsl2rgb(float h, float s, float l) {
      float c = (1.0 - abs(2.0 * l - 1.0)) * s;
      float x = c * (1.0 - abs(mod(h / 60.0, 2.0) - 1.0));
      float m = l - c / 2.0;
      vec3 rgb;
      if (h < 60.0) rgb = vec3(c, x, 0.0);
      else if (h < 120.0) rgb = vec3(x, c, 0.0);
      else if (h < 180.0) rgb = vec3(0.0, c, x);
      else if (h < 240.0) rgb = vec3(0.0, x, c);
      else if (h < 300.0) rgb = vec3(x, 0.0, c);
      else rgb = vec3(c, 0.0, x);
      return rgb + m;
    }
    
    void main() {
      // Circular point
      vec2 coord = gl_PointCoord - vec2(0.5);
      float dist = length(coord);
      if (dist > 0.5) discard;
      
      float softEdge = 1.0 - smoothstep(0.3, 0.5, dist);
      
      float hue, sat, light;
      
      if (u_colorMode == 0) { // Amber
        hue = 25.0 + v_prob * 40.0;
        sat = 0.9;
        light = 0.55;
      } else if (u_colorMode == 1) { // Blue
        hue = 200.0 + v_prob * 30.0;
        sat = 0.85;
        light = 0.6;
      } else if (u_colorMode == 2) { // Lotus (rainbow)
        hue = mod(v_prob * 360.0, 360.0);
        sat = 0.75;
        light = 0.65;
      } else if (u_colorMode == 3) { // Dark Red
        hue = v_prob * 25.0;
        sat = 0.8;
        light = 0.45;
      } else { // Spring
        hue = 110.0 + v_prob * 50.0;
        sat = 0.7;
        light = 0.55;
      }
      
      vec3 color = hsl2rgb(hue, sat, light);
      float alpha = v_alpha * softEdge;
      
      gl_FragColor = vec4(color, alpha);
    }
  </script>

  <script>
  /**
   * Atom Orbital Visualization v3 — WebGL
   * 
   * Performance-optimiert für 100K+ Partikel bei 60 FPS
   * - GPU-basiertes Point Rendering
   * - Instanced Attributes
   * - Shader-basierte Transformation
   */
  (function() {
    'use strict';
    
    // === CONFIG ===
    const CONFIG = {
      maxParticles: 150000,
      baseScale: 100,
    };
    
    // === STATE ===
    const state = {
      n: 3, l: 2, m: 0,
      particleCount: 50000,
      zoom: 1.0,
      rotationY: 0,
      rotationX: 0.3,
      rotationSpeed: 0.5,
      paused: false,
      colorMode: 0,
      isDragging: false,
      lastMouseX: 0,
      lastMouseY: 0,
      // FPS
      lastTime: 0,
      frameCount: 0,
      fps: 60,
    };
    
    // === WEBGL SETUP ===
    const canvas = document.getElementById('canvas');
    const gl = canvas.getContext('webgl', { 
      antialias: true, 
      alpha: false,
      powerPreference: 'high-performance',
      preserveDrawingBuffer: true  // Required for screenshot/GIF export
    });
    
    if (!gl) {
      alert('WebGL nicht unterstützt. Bitte nutze einen modernen Browser.');
      throw new Error('WebGL not supported');
    }
    
    // Enable point sprites
    gl.enable(gl.BLEND);
    gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);
    
    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      gl.viewport(0, 0, canvas.width, canvas.height);
    }
    resize();
    window.addEventListener('resize', resize);
    
    // === COMPILE SHADER ===
    function compileShader(type, source) {
      const shader = gl.createShader(type);
      gl.shaderSource(shader, source);
      gl.compileShader(shader);
      if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
        console.error('Shader compile error:', gl.getShaderInfoLog(shader));
        return null;
      }
      return shader;
    }
    
    // === CREATE PROGRAM ===
    const vertexSource = document.getElementById('vertex-shader').textContent;
    const fragmentSource = document.getElementById('fragment-shader').textContent;
    
    const vertexShader = compileShader(gl.VERTEX_SHADER, vertexSource);
    const fragmentShader = compileShader(gl.FRAGMENT_SHADER, fragmentSource);
    
    const program = gl.createProgram();
    gl.attachShader(program, vertexShader);
    gl.attachShader(program, fragmentShader);
    gl.linkProgram(program);
    
    if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
      console.error('Program link error:', gl.getProgramInfoLog(program));
    }
    
    gl.useProgram(program);
    
    // === ATTRIBUTES & UNIFORMS ===
    const a_position = gl.getAttribLocation(program, 'a_position');
    const a_size = gl.getAttribLocation(program, 'a_size');
    const a_alpha = gl.getAttribLocation(program, 'a_alpha');
    const a_prob = gl.getAttribLocation(program, 'a_prob');
    
    const u_projection = gl.getUniformLocation(program, 'u_projection');
    const u_view = gl.getUniformLocation(program, 'u_view');
    const u_time = gl.getUniformLocation(program, 'u_time');
    const u_zoom = gl.getUniformLocation(program, 'u_zoom');
    const u_rotation = gl.getUniformLocation(program, 'u_rotation');
    const u_colorMode = gl.getUniformLocation(program, 'u_colorMode');
    
    // === BUFFERS ===
    const positionBuffer = gl.createBuffer();
    const sizeBuffer = gl.createBuffer();
    const alphaBuffer = gl.createBuffer();
    const probBuffer = gl.createBuffer();
    
    // TypedArrays for data
    const positions = new Float32Array(CONFIG.maxParticles * 3);
    const sizes = new Float32Array(CONFIG.maxParticles);
    const alphas = new Float32Array(CONFIG.maxParticles);
    const probs = new Float32Array(CONFIG.maxParticles);
    
    // === ORBITAL PROBABILITY ===
    function orbitalProbability(n, l, m, x, y, z) {
      const r = Math.sqrt(x*x + y*y + z*z);
      if (r < 0.001) return 0;
      
      const theta = Math.acos(z / r);
      const phi = Math.atan2(y, x);
      
      const rho = 2 * r / n;
      const radial = Math.exp(-rho / 2) * Math.pow(rho, l);
      
      const cosT = Math.cos(theta);
      const sinT = Math.sin(theta);
      
      let angular = 0;
      const absM = Math.abs(m);
      
      if (l === 0) angular = 1;
      else if (l === 1) angular = absM === 0 ? cosT : sinT;
      else if (l === 2) {
        if (absM === 0) angular = 3*cosT*cosT - 1;
        else if (absM === 1) angular = sinT * cosT;
        else angular = sinT * sinT;
      } else if (l === 3) {
        if (absM === 0) angular = cosT * (5*cosT*cosT - 3);
        else if (absM === 1) angular = sinT * (5*cosT*cosT - 1);
        else if (absM === 2) angular = sinT * sinT * cosT;
        else angular = sinT * sinT * sinT;
      } else {
        angular = Math.pow(sinT, absM) * Math.pow(cosT, l - absM);
      }
      
      if (m > 0) angular *= Math.cos(m * phi);
      else if (m < 0) angular *= Math.sin(absM * phi);
      
      return radial * radial * angular * angular;
    }
    
    // === GENERATE PARTICLES ===
    function generateParticles() {
      const { n, l, m, particleCount } = state;
      const maxR = (n + l + 1) * 2;
      
      let generated = 0;
      let attempts = 0;
      const maxAttempts = particleCount * 50;
      
      // Find max probability
      let maxProb = 0;
      for (let i = 0; i < 300; i++) {
        const testR = Math.random() * maxR;
        const testTheta = Math.random() * Math.PI;
        const testX = testR * Math.sin(testTheta);
        const testZ = testR * Math.cos(testTheta);
        const p = orbitalProbability(n, l, m, testX, 0, testZ);
        if (p > maxProb) maxProb = p;
      }
      if (maxProb < 0.0001) maxProb = 0.0001;
      
      while (generated < particleCount && attempts < maxAttempts) {
        const u = Math.random();
        const v = Math.random();
        const theta = 2 * Math.PI * u;
        const phi = Math.acos(2 * v - 1);
        const r = Math.pow(Math.random(), 0.33) * maxR;
        
        const x = r * Math.sin(phi) * Math.cos(theta);
        const y = r * Math.sin(phi) * Math.sin(theta);
        const z = r * Math.cos(phi);
        
        const prob = orbitalProbability(n, l, m, x, y, z) / maxProb;
        
        if (Math.random() < prob) {
          const idx = generated * 3;
          positions[idx] = x * CONFIG.baseScale;
          positions[idx + 1] = y * CONFIG.baseScale;
          positions[idx + 2] = z * CONFIG.baseScale;
          sizes[generated] = 2 + Math.random() * 2;
          alphas[generated] = 0.4 + Math.random() * 0.5;
          probs[generated] = prob;
          generated++;
        }
        attempts++;
      }
      
      // Fill remaining
      while (generated < particleCount) {
        const r = Math.random() * maxR * 0.3;
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(2 * Math.random() - 1);
        
        const idx = generated * 3;
        positions[idx] = r * Math.sin(phi) * Math.cos(theta) * CONFIG.baseScale;
        positions[idx + 1] = r * Math.sin(phi) * Math.sin(theta) * CONFIG.baseScale;
        positions[idx + 2] = r * Math.cos(phi) * CONFIG.baseScale;
        sizes[generated] = 1.5;
        alphas[generated] = 0.15;
        probs[generated] = 0.1;
        generated++;
      }
      
      // Upload to GPU
      gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
      gl.bufferData(gl.ARRAY_BUFFER, positions, gl.STATIC_DRAW);
      
      gl.bindBuffer(gl.ARRAY_BUFFER, sizeBuffer);
      gl.bufferData(gl.ARRAY_BUFFER, sizes, gl.STATIC_DRAW);
      
      gl.bindBuffer(gl.ARRAY_BUFFER, alphaBuffer);
      gl.bufferData(gl.ARRAY_BUFFER, alphas, gl.STATIC_DRAW);
      
      gl.bindBuffer(gl.ARRAY_BUFFER, probBuffer);
      gl.bufferData(gl.ARRAY_BUFFER, probs, gl.STATIC_DRAW);
      
      console.log(`Generated ${generated} particles`);
    }
    
    // === MATRICES ===
    function perspectiveMatrix(fov, aspect, near, far) {
      const f = 1.0 / Math.tan(fov / 2);
      const nf = 1 / (near - far);
      return new Float32Array([
        f / aspect, 0, 0, 0,
        0, f, 0, 0,
        0, 0, (far + near) * nf, -1,
        0, 0, 2 * far * near * nf, 0
      ]);
    }
    
    function lookAtMatrix(eye, center, up) {
      const zAxis = normalize([eye[0] - center[0], eye[1] - center[1], eye[2] - center[2]]);
      const xAxis = normalize(cross(up, zAxis));
      const yAxis = cross(zAxis, xAxis);
      
      return new Float32Array([
        xAxis[0], yAxis[0], zAxis[0], 0,
        xAxis[1], yAxis[1], zAxis[1], 0,
        xAxis[2], yAxis[2], zAxis[2], 0,
        -dot(xAxis, eye), -dot(yAxis, eye), -dot(zAxis, eye), 1
      ]);
    }
    
    function normalize(v) {
      const len = Math.sqrt(v[0]*v[0] + v[1]*v[1] + v[2]*v[2]);
      return [v[0]/len, v[1]/len, v[2]/len];
    }
    
    function cross(a, b) {
      return [
        a[1]*b[2] - a[2]*b[1],
        a[2]*b[0] - a[0]*b[2],
        a[0]*b[1] - a[1]*b[0]
      ];
    }
    
    function dot(a, b) {
      return a[0]*b[0] + a[1]*b[1] + a[2]*b[2];
    }
    
    // === RENDER ===
    function render(time) {
      if (state.paused) {
        requestAnimationFrame(render);
        return;
      }
      
      const w = canvas.width;
      const h = canvas.height;
      
      // Clear with cosmic gradient (done via CSS, just clear depth)
      gl.clearColor(0.04, 0.03, 0.07, 1.0);
      gl.clear(gl.COLOR_BUFFER_BIT);
      
      // Matrices
      const projection = perspectiveMatrix(Math.PI / 4, w / h, 1, 2000);
      const view = lookAtMatrix([0, 0, 500], [0, 0, 0], [0, 1, 0]);
      
      // Uniforms
      gl.uniformMatrix4fv(u_projection, false, projection);
      gl.uniformMatrix4fv(u_view, false, view);
      gl.uniform1f(u_time, time * state.rotationSpeed);
      gl.uniform1f(u_zoom, state.zoom);
      gl.uniform2f(u_rotation, state.rotationY, state.rotationX);
      gl.uniform1i(u_colorMode, state.colorMode);
      
      // Bind attributes
      gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
      gl.enableVertexAttribArray(a_position);
      gl.vertexAttribPointer(a_position, 3, gl.FLOAT, false, 0, 0);
      
      gl.bindBuffer(gl.ARRAY_BUFFER, sizeBuffer);
      gl.enableVertexAttribArray(a_size);
      gl.vertexAttribPointer(a_size, 1, gl.FLOAT, false, 0, 0);
      
      gl.bindBuffer(gl.ARRAY_BUFFER, alphaBuffer);
      gl.enableVertexAttribArray(a_alpha);
      gl.vertexAttribPointer(a_alpha, 1, gl.FLOAT, false, 0, 0);
      
      gl.bindBuffer(gl.ARRAY_BUFFER, probBuffer);
      gl.enableVertexAttribArray(a_prob);
      gl.vertexAttribPointer(a_prob, 1, gl.FLOAT, false, 0, 0);
      
      // Draw all particles in ONE call!
      gl.drawArrays(gl.POINTS, 0, state.particleCount);
      
      // FPS
      state.frameCount++;
      if (time - state.lastTime >= 1000) {
        state.fps = state.frameCount;
        state.frameCount = 0;
        state.lastTime = time;
        document.getElementById('fps').textContent = state.fps;
        document.getElementById('active-particles').textContent = state.particleCount.toLocaleString();
      }
      
      requestAnimationFrame(render);
    }
    
    // === CONTROLS ===
    const nSlider = document.getElementById('n-slider');
    const lSlider = document.getElementById('l-slider');
    const mSlider = document.getElementById('m-slider');
    
    function updateQuantum() {
      state.n = parseInt(nSlider.value);
      state.l = Math.min(parseInt(lSlider.value), state.n - 1);
      state.m = Math.max(-state.l, Math.min(parseInt(mSlider.value), state.l));
      
      lSlider.max = state.n - 1;
      lSlider.value = state.l;
      mSlider.min = -state.l;
      mSlider.max = state.l;
      mSlider.value = state.m;
      
      document.getElementById('n-val').textContent = state.n;
      document.getElementById('l-val').textContent = state.l;
      document.getElementById('m-val').textContent = state.m;
      
      generateParticles();
      document.querySelectorAll('.quantum-btn').forEach(b => b.classList.remove('active'));
    }
    
    nSlider.addEventListener('input', updateQuantum);
    lSlider.addEventListener('input', updateQuantum);
    mSlider.addEventListener('input', updateQuantum);
    
    document.getElementById('particle-slider').addEventListener('input', function() {
      state.particleCount = parseInt(this.value);
      document.getElementById('particle-count').textContent = state.particleCount.toLocaleString();
      generateParticles();
    });
    
    document.getElementById('zoom-slider').addEventListener('input', function() {
      state.zoom = parseInt(this.value) / 100;
      document.getElementById('zoom-val').textContent = parseInt(this.value);
    });
    
    document.getElementById('rotation-slider').addEventListener('input', function() {
      state.rotationSpeed = parseInt(this.value) / 100;
      document.getElementById('rotation-val').textContent = parseInt(this.value);
    });
    
    // Presets
    document.querySelectorAll('.quantum-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        nSlider.value = btn.dataset.n;
        lSlider.value = btn.dataset.l;
        mSlider.value = btn.dataset.m;
        updateQuantum();
        document.querySelectorAll('.quantum-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      });
    });
    
    // Color mode
    document.querySelectorAll('.color-btn').forEach((btn, idx) => {
      btn.addEventListener('click', () => {
        state.colorMode = idx;
        document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      });
    });
    
    // Pause/Reset
    document.getElementById('pause-btn').addEventListener('click', function() {
      state.paused = !state.paused;
      this.textContent = state.paused ? '▶ Play' : '⏸ Pause';
    });
    
    document.getElementById('reset-btn').addEventListener('click', () => {
      state.rotationY = 0;
      state.rotationX = 0.3;
      state.zoom = 1;
      document.getElementById('zoom-slider').value = 100;
      document.getElementById('zoom-val').textContent = '100';
      generateParticles();
    });
    
    // === MOUSE CONTROLS ===
    // Scroll zoom
    canvas.addEventListener('wheel', (e) => {
      e.preventDefault();
      const delta = e.deltaY > 0 ? -0.1 : 0.1;
      state.zoom = Math.max(0.25, Math.min(4, state.zoom + delta));
      document.getElementById('zoom-slider').value = Math.round(state.zoom * 100);
      document.getElementById('zoom-val').textContent = Math.round(state.zoom * 100);
    }, { passive: false });
    
    // Right-click drag for rotation
    canvas.addEventListener('contextmenu', e => e.preventDefault());
    
    canvas.addEventListener('mousedown', (e) => {
      if (e.button === 2) {
        state.isDragging = true;
        state.lastMouseX = e.clientX;
        state.lastMouseY = e.clientY;
      }
    });
    
    canvas.addEventListener('mousemove', (e) => {
      if (state.isDragging) {
        const dx = e.clientX - state.lastMouseX;
        const dy = e.clientY - state.lastMouseY;
        state.rotationY += dx * 0.005;
        state.rotationX += dy * 0.005;
        state.rotationX = Math.max(-Math.PI/2, Math.min(Math.PI/2, state.rotationX));
        state.lastMouseX = e.clientX;
        state.lastMouseY = e.clientY;
      }
    });
    
    canvas.addEventListener('mouseup', () => state.isDragging = false);
    canvas.addEventListener('mouseleave', () => state.isDragging = false);
    
    // Touch support
    let lastTouchDist = 0;
    let lastTouchX = 0, lastTouchY = 0;
    
    canvas.addEventListener('touchstart', (e) => {
      if (e.touches.length === 1) {
        lastTouchX = e.touches[0].clientX;
        lastTouchY = e.touches[0].clientY;
      } else if (e.touches.length === 2) {
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        lastTouchDist = Math.sqrt(dx*dx + dy*dy);
      }
    });
    
    canvas.addEventListener('touchmove', (e) => {
      e.preventDefault();
      if (e.touches.length === 1) {
        const dx = e.touches[0].clientX - lastTouchX;
        const dy = e.touches[0].clientY - lastTouchY;
        state.rotationY += dx * 0.005;
        state.rotationX += dy * 0.005;
        state.rotationX = Math.max(-Math.PI/2, Math.min(Math.PI/2, state.rotationX));
        lastTouchX = e.touches[0].clientX;
        lastTouchY = e.touches[0].clientY;
      } else if (e.touches.length === 2) {
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        const dist = Math.sqrt(dx*dx + dy*dy);
        const delta = (dist - lastTouchDist) / 200;
        state.zoom = Math.max(0.25, Math.min(4, state.zoom + delta));
        lastTouchDist = dist;
      }
    }, { passive: false });
    
    // === EXPORT FUNCTIONS ===
    // Screenshot
    // === SCREENSHOT ===
    document.getElementById('screenshot-btn').addEventListener('click', () => {
      const link = document.createElement('a');
      link.download = `atom-orbital-${state.n}${['s','p','d','f','g'][state.l]}${state.m >= 0 ? '+' : ''}${state.m}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    });
    
    // === VIDEO RECORDING (WebM with MediaRecorder) ===
    let isRecording = false;
    let recordingDuration = 5;
    let cropMode = false;
    let portraitMode = false;
    let cropRect = null;
    let cropOverlay = null;
    
    document.getElementById('rec-duration').addEventListener('input', function() {
      recordingDuration = parseInt(this.value);
      document.getElementById('rec-duration-val').textContent = recordingDuration;
    });
    
    document.getElementById('rec-crop').addEventListener('change', function() {
      cropMode = this.checked;
      if (cropMode && !cropOverlay) {
        createCropOverlay();
      } else if (!cropMode && cropOverlay) {
        cropOverlay.remove();
        cropOverlay = null;
        cropRect = null;
      }
    });
    
    document.getElementById('rec-portrait').addEventListener('change', function() {
      portraitMode = this.checked;
      console.log('Portrait mode:', portraitMode);
    });
    
    function createCropOverlay() {
      cropOverlay = document.createElement('div');
      cropOverlay.id = 'crop-overlay';
      cropOverlay.style.cssText = `
        position: fixed; top: 0; left: 0; right: 0; bottom: 0;
        z-index: 50; cursor: crosshair;
        background: rgba(0,0,0,0.3);
      `;
      
      const cropBox = document.createElement('div');
      cropBox.id = 'crop-box';
      cropBox.style.cssText = `
        position: absolute;
        border: 2px dashed #FFD700;
        background: transparent;
        box-shadow: 0 0 0 9999px rgba(0,0,0,0.5);
        min-width: 100px; min-height: 100px;
      `;
      
      // Default crop area (center 400x400)
      const cx = window.innerWidth / 2;
      const cy = window.innerHeight / 2;
      const size = 300;
      cropRect = { x: cx - size/2, y: cy - size/2, w: size, h: size };
      updateCropBox(cropBox);
      
      cropOverlay.appendChild(cropBox);
      document.body.appendChild(cropOverlay);
      
      // Drag to resize
      let dragging = false;
      let dragStart = { x: 0, y: 0 };
      
      cropBox.addEventListener('mousedown', (e) => {
        dragging = true;
        dragStart = { x: e.clientX - cropRect.x, y: e.clientY - cropRect.y };
        e.stopPropagation();
      });
      
      cropOverlay.addEventListener('mousedown', (e) => {
        if (e.target === cropOverlay) {
          cropRect.x = e.clientX - cropRect.w / 2;
          cropRect.y = e.clientY - cropRect.h / 2;
          updateCropBox(cropBox);
        }
      });
      
      document.addEventListener('mousemove', (e) => {
        if (dragging) {
          cropRect.x = e.clientX - dragStart.x;
          cropRect.y = e.clientY - dragStart.y;
          updateCropBox(cropBox);
        }
      });
      
      document.addEventListener('mouseup', () => { dragging = false; });
      
      // Size controls via scroll on crop box
      cropBox.addEventListener('wheel', (e) => {
        e.preventDefault();
        const delta = e.deltaY > 0 ? -20 : 20;
        cropRect.w = Math.max(100, Math.min(800, cropRect.w + delta));
        cropRect.h = Math.max(100, Math.min(800, cropRect.h + delta));
        updateCropBox(cropBox);
      });
      
      // Info text
      const info = document.createElement('div');
      info.style.cssText = `
        position: fixed; top: 10px; left: 50%; transform: translateX(-50%);
        background: rgba(0,0,0,0.8); color: #FFD700; padding: 8px 16px;
        border-radius: 8px; font-size: 12px; z-index: 51;
      `;
      info.textContent = 'Klick zum Platzieren · Scrollen für Größe · Recording startet nur Ausschnitt';
      cropOverlay.appendChild(info);
    }
    
    function updateCropBox(box) {
      box.style.left = cropRect.x + 'px';
      box.style.top = cropRect.y + 'px';
      box.style.width = cropRect.w + 'px';
      box.style.height = cropRect.h + 'px';
    }
    
    document.getElementById('record-btn').addEventListener('click', async () => {
      console.log('Record button clicked!');
      
      if (isRecording) {
        console.log('Already recording, ignoring click');
        return;
      }
      
      isRecording = true;
      const progressDiv = document.getElementById('rec-progress');
      const progressBar = document.getElementById('rec-bar');
      const statusText = document.getElementById('rec-status');
      const recordBtn = document.getElementById('record-btn');
      
      recordBtn.textContent = '⏺ Rec...';
      recordBtn.style.color = '#ef4444';
      progressDiv.classList.remove('hidden');
      statusText.textContent = `Aufnahme startet...`;
      console.log('Recording starting...');
      
      // Keep crop overlay visible but semi-transparent during recording
      if (cropOverlay) {
        cropOverlay.style.opacity = '0.3';
        cropOverlay.style.pointerEvents = 'none';
      }
      
      try {
        // Determine output resolution
        let captureW, captureH;
        
        if (portraitMode) {
          // Mobile portrait format: 720x1280
          captureW = 720;
          captureH = 1280;
        } else if (cropMode && cropRect) {
          captureW = cropRect.w;
          captureH = cropRect.h;
        } else {
          // Default landscape 1280x720
          captureW = Math.min(canvas.width, 1280);
          captureH = Math.min(canvas.height, 720);
        }
        const captureCanvas = document.createElement('canvas');
        captureCanvas.width = captureW;
        captureCanvas.height = captureH;
        const captureCtx = captureCanvas.getContext('2d');
        
        console.log(`Recording: ${captureW}x${captureH}, ${recordingDuration}s`);
        
        // Check MediaRecorder support
        if (!window.MediaRecorder) {
          throw new Error('MediaRecorder nicht unterstützt');
        }
        
        // Try different codecs
        let mimeType = 'video/webm';
        if (MediaRecorder.isTypeSupported('video/webm;codecs=vp9')) {
          mimeType = 'video/webm;codecs=vp9';
        } else if (MediaRecorder.isTypeSupported('video/webm;codecs=vp8')) {
          mimeType = 'video/webm;codecs=vp8';
        } else if (MediaRecorder.isTypeSupported('video/webm')) {
          mimeType = 'video/webm';
        }
        console.log('Using codec:', mimeType);
        
        // Start capture stream from 2D canvas - high FPS for smooth playback
        const targetFPS = 55;
        const stream = captureCanvas.captureStream(targetFPS);
        const recorder = new MediaRecorder(stream, {
          mimeType: mimeType,
          videoBitsPerSecond: 12000000  // 12 Mbps for high quality + sharp contrast
        });
        
        const chunks = [];
        recorder.ondataavailable = (e) => {
          if (e.data.size > 0) chunks.push(e.data);
        };
        
        // Frame capture loop - copy WebGL to 2D canvas
        let frameCount = 0;
        const captureFrame = () => {
          // Clear with black for sharp contrast
          captureCtx.fillStyle = '#000';
          captureCtx.fillRect(0, 0, captureW, captureH);
          
          if (cropMode && cropRect) {
            captureCtx.drawImage(
              canvas, 
              cropRect.x, cropRect.y, cropRect.w, cropRect.h,
              0, 0, captureW, captureH
            );
          } else if (portraitMode) {
            // Portrait: crop center of canvas to 9:16 aspect ratio
            const srcAspect = canvas.width / canvas.height;
            const dstAspect = captureW / captureH; // 720/1280 = 0.5625
            
            let srcX, srcY, srcW, srcH;
            if (srcAspect > dstAspect) {
              // Canvas is wider - crop sides
              srcH = canvas.height;
              srcW = canvas.height * dstAspect;
              srcX = (canvas.width - srcW) / 2;
              srcY = 0;
            } else {
              // Canvas is taller - crop top/bottom
              srcW = canvas.width;
              srcH = canvas.width / dstAspect;
              srcX = 0;
              srcY = (canvas.height - srcH) / 2;
            }
            
            captureCtx.drawImage(canvas, srcX, srcY, srcW, srcH, 0, 0, captureW, captureH);
          } else {
            captureCtx.drawImage(canvas, 0, 0, captureW, captureH);
          }
          frameCount++;
        };
        
        // Start frame capture interval - match target FPS
        const frameInterval = setInterval(captureFrame, Math.floor(1000 / 55));  // ~55 FPS
        
        recorder.start(100);  // Capture in 100ms chunks
        statusText.textContent = `Aufnahme... ${recordingDuration}s`;
        
        // Progress updates
        const startTime = Date.now();
        const progressInterval = setInterval(() => {
          const elapsed = (Date.now() - startTime) / 1000;
          const progress = Math.min(100, (elapsed / recordingDuration) * 100);
          progressBar.style.width = progress + '%';
          statusText.textContent = `Aufnahme... ${Math.ceil(recordingDuration - elapsed)}s (${frameCount} frames)`;
        }, 200);
        
        // Stop after duration
        await new Promise(resolve => setTimeout(resolve, recordingDuration * 1000));
        
        clearInterval(progressInterval);
        clearInterval(frameInterval);
        recorder.stop();
        
        console.log(`Recorded ${frameCount} frames`);
        
        // Wait for final data
        await new Promise(resolve => { 
          recorder.onstop = () => {
            console.log(`Got ${chunks.length} chunks`);
            resolve();
          };
        });
        
        if (chunks.length === 0) {
          throw new Error('Keine Frames aufgenommen');
        }
        
        statusText.textContent = 'Video wird erstellt...';
        progressBar.style.width = '100%';
        
        const blob = new Blob(chunks, { type: mimeType });
        console.log(`Video blob: ${(blob.size / 1024).toFixed(1)} KB`);
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.download = `atom-orbital-${state.n}${['s','p','d','f','g'][state.l]}${state.m >= 0 ? '+' : ''}${state.m}.webm`;
        link.href = url;
        link.click();
        
        statusText.textContent = 'Fertig! Download gestartet.';
        
        setTimeout(() => {
          URL.revokeObjectURL(url);
          progressDiv.classList.add('hidden');
          isRecording = false;
          recordBtn.textContent = '🎬 WebM';
          recordBtn.style.color = '';
          if (cropOverlay) {
            cropOverlay.style.opacity = '1';
            cropOverlay.style.pointerEvents = 'auto';
          }
        }, 1500);
        
      } catch (err) {
        console.error('Recording failed:', err);
        statusText.textContent = 'Fehler: ' + err.message;
        setTimeout(() => {
          progressDiv.classList.add('hidden');
          isRecording = false;
          recordBtn.textContent = '🎬 WebM';
          recordBtn.style.color = '';
          if (cropOverlay) {
            cropOverlay.style.opacity = '1';
            cropOverlay.style.pointerEvents = 'auto';
          }
        }, 2000);
      }
    });
    
    // === INIT ===
    console.log('Atom Orbital v3 (WebGL) starting...');
    generateParticles();
    requestAnimationFrame(render);
    
  })();
  </script>
